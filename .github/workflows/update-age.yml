name: Auto Update Age

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  update-age:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Calculate and Update Age
        run: |
          node -e "
          const fs = require('fs');
          const birthDate = new Date('2004-06-09T14:55:00-03:00');
          
          const tzOffset = -3;
          const now = new Date();
          const localNow = new Date(now.getTime() + (tzOffset * 60 + now.getTimezoneOffset()) * 60000);
          
          let age = localNow.getFullYear() - birthDate.getFullYear();
          const monthDiff = localNow.getMonth() - birthDate.getMonth();
          if (monthDiff < 0 || (monthDiff === 0 && localNow.getDate() < birthDate.getDate())) {
            age--;
          }
          
          let readme = fs.readFileSync('README.md', 'utf8');
          const updatedReadme = readme.replace(/(<!-- AGE -->)\\d+(<!-- \\/AGE -->)/g, \`\$1\${age}\$2\`);
          
          if (readme !== updatedReadme) {
            fs.writeFileSync('README.md', updatedReadme);
            console.log(\`Age updated to \${age}\`);
            process.exit(0);
          } else {
            console.log('Age is already up to date.');
            process.exit(0);
          }
          "

      - name: Commit & Push Changes
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config --global user.name "github-actions[bot]"
            git config --global user.email "github-actions[bot]@users.noreply.github.com"
            git commit -am "chore: auto-update age in README"
            git push
          else
            echo "No changes to commit."
          fi
